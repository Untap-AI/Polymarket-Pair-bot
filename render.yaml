# render.yaml — Render Blueprint (Infrastructure-as-Code)
#
# To deploy: connect this repo on Render and it will auto-detect this file.
# Set the secret environment variables in the Render dashboard after creation.

envVarGroups:
  - name: Daily Report cron
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: SENDGRID_TO_EMAIL
        sync: false

services:
  - type: worker
    name: polymarket-pair-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: frankfurt
    plan: starter                        # 512 MB RAM, 0.5 CPU — $7/mo
    branch: main
    autoDeploy: true
    # Run migrations before the new release starts
    preDeployCommand: python scripts/migrate.py apply
    envVars:
      # --- Required (set value in Render dashboard → Environment) ---
      - key: DATABASE_URL
        sync: false                      # must be set manually (secret)
      # --- Bot configuration ---
      - key: DELTA_POINTS
        value: "3,4,5,6,7,8,9,10"
      # Comma-separated stop loss thresholds (optional, omit for no stop loss)
      # - key: STOP_LOSS_THRESHOLD
      #   value: "1,2,3"
      - key: S0_POINTS
        value: "1"
      - key: CONSOLE_DASHBOARD
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"
      - key: LOG_FILE
        value: "logs/bot.log"

  # Daily parameter optimization reports (5am PST / 13:00 UTC) — one per asset
  - type: cron
    name: daily-report-btc
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: python scripts/daily_report.py --markets BTC
    schedule: "0 13 * * *"
    region: frankfurt
    branch: main
    envVarGroups:
      - Daily Report cron

  - type: cron
    name: daily-report-eth
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: python scripts/daily_report.py --markets ETH
    schedule: "0 13 * * *"
    region: frankfurt
    branch: main
    envVarGroups:
      - Daily Report cron

  - type: cron
    name: daily-report-sol
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: python scripts/daily_report.py --markets SOL
    schedule: "0 13 * * *"
    region: frankfurt
    branch: main
    envVarGroups:
      - Daily Report cron

  - type: cron
    name: daily-report-xrp
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: python scripts/daily_report.py --markets XRP
    schedule: "0 13 * * *"
    region: frankfurt
    branch: main
    envVarGroups:
      - Daily Report cron

  # Dashboard — Next.js analytics UI
  - type: web
    name: pair-analytics-dashboard
    runtime: node
    rootDir: dashboard
    buildCommand: npm install && npm run build
    startCommand: npm start
    region: frankfurt
    plan: starter
    branch: main
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false                      # must be set manually (same as bot)
